name: Build MoXing Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux (CUDA 13.2 + ROCm 7.1 + Vulkan + CPU)
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install CUDA 13.2
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/wsl-ubuntu/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt update
          sudo apt install -y cuda-toolkit-13-2
      
      - name: Install ROCm 7.1
        run: |
          sudo apt install -y libstdc++-12-dev
          wget https://repo.radeon.com/amdgpu-install/7.1/ubuntu/jammy/amdgpu-install_7.1.50502-1_all.deb
          sudo dpkg -i amdgpu-install_7.1.50502-1_all.deb
          sudo amdgpu-install --usecase=rocm,hip --no-dkms -y
      
      - name: Install Vulkan SDK
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install -y vulkan-sdk
      
      - name: Install build dependencies
        run: |
          sudo apt install -y build-essential cmake git libcurl4-openssl-dev
      
      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --recursive https://github.com/ggml-org/llama.cpp.git build/llama.cpp
      
      - name: Build CUDA 13.2
        run: |
          export PATH=/usr/local/cuda-13.2/bin:$PATH
          export LD_LIBRARY_PATH=/usr/local/cuda-13.2/lib64:$LD_LIBRARY_PATH
          cd build/llama.cpp
          mkdir build-cuda && cd build-cuda
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CUDA=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_COMMON=ON \
            -DCMAKE_CUDA_ARCHITECTURES="89;90" \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda-13.2/bin/nvcc
          cmake --build . --config Release -j$(nproc)
      
      - name: Build ROCm 7.1 (gfx1100 for RX 7900 XTX)
        run: |
          export PATH=/opt/rocm/bin:$PATH
          export LD_LIBRARY_PATH=/opt/rocm/lib:$LD_LIBRARY_PATH
          cd build/llama.cpp
          mkdir build-rocm && cd build-rocm
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_HIPBLAS=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_COMMON=ON \
            -DAMDGPU_TARGETS=gfx1100 \
            -DCMAKE_C_COMPILER=/opt/rocm/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=/opt/rocm/llvm/bin/clang++
          cmake --build . --config Release -j$(nproc)
      
      - name: Build Vulkan
        run: |
          cd build/llama.cpp
          mkdir build-vulkan && cd build-vulkan
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_VULKAN=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(nproc)
      
      - name: Build CPU
        run: |
          cd build/llama.cpp
          mkdir build-cpu && cd build-cpu
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(nproc)
      
      - name: Copy binaries
        run: |
          mkdir -p moxing/bin/linux-x64-cuda
          mkdir -p moxing/bin/linux-x64-rocm
          mkdir -p moxing/bin/linux-x64-vulkan
          mkdir -p moxing/bin/linux-x64-cpu
          
          cd build/llama.cpp
          
          cp build-cuda/bin/llama-server ../moxing/bin/linux-x64-cuda/ 2>/dev/null || true
          cp build-cuda/bin/llama-cli ../moxing/bin/linux-x64-cuda/ 2>/dev/null || true
          cp build-cuda/bin/llama-bench ../moxing/bin/linux-x64-cuda/ 2>/dev/null || true
          cp build-cuda/libggml.so* ../moxing/bin/linux-x64-cuda/ 2>/dev/null || true
          cp build-cuda/libllama.so* ../moxing/bin/linux-x64-cuda/ 2>/dev/null || true
          cp build-cuda/libggml-cuda.so* ../moxing/bin/linux-x64-cuda/ 2>/dev/null || true
          
          cp build-rocm/bin/llama-server ../moxing/bin/linux-x64-rocm/ 2>/dev/null || true
          cp build-rocm/bin/llama-cli ../moxing/bin/linux-x64-rocm/ 2>/dev/null || true
          cp build-rocm/bin/llama-bench ../moxing/bin/linux-x64-rocm/ 2>/dev/null || true
          cp build-rocm/libggml.so* ../moxing/bin/linux-x64-rocm/ 2>/dev/null || true
          cp build-rocm/libllama.so* ../moxing/bin/linux-x64-rocm/ 2>/dev/null || true
          cp build-rocm/libggml-hip.so* ../moxing/bin/linux-x64-rocm/ 2>/dev/null || true
          
          cp build-vulkan/bin/llama-server ../moxing/bin/linux-x64-vulkan/ 2>/dev/null || true
          cp build-vulkan/bin/llama-cli ../moxing/bin/linux-x64-vulkan/ 2>/dev/null || true
          cp build-vulkan/bin/llama-bench ../moxing/bin/linux-x64-vulkan/ 2>/dev/null || true
          cp build-vulkan/libggml.so* ../moxing/bin/linux-x64-vulkan/ 2>/dev/null || true
          cp build-vulkan/libllama.so* ../moxing/bin/linux-x64-vulkan/ 2>/dev/null || true
          cp build-vulkan/libggml-vulkan.so* ../moxing/bin/linux-x64-vulkan/ 2>/dev/null || true
          
          cp build-cpu/bin/llama-server ../moxing/bin/linux-x64-cpu/ 2>/dev/null || true
          cp build-cpu/bin/llama-cli ../moxing/bin/linux-x64-cpu/ 2>/dev/null || true
          cp build-cpu/bin/llama-bench ../moxing/bin/linux-x64-cpu/ 2>/dev/null || true
          cp build-cpu/libggml.so* ../moxing/bin/linux-x64-cpu/ 2>/dev/null || true
          cp build-cpu/libllama.so* ../moxing/bin/linux-x64-cpu/ 2>/dev/null || true
      
      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: moxing/bin/linux-x64-*

  build-windows:
    runs-on: windows-latest
    name: Build Windows (CUDA + Vulkan + CPU)
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install CUDA via winget
        shell: powershell
        run: |
          # 使用 winget 安装最新 CUDA
          winget install -e --id NVIDIA.CUDA --accept-package-agreements --accept-source-agreements
          
          # 设置环境变量
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA"
          $cudaVersion = Get-ChildItem $cudaPath | Sort-Object -Descending | Select-Object -First 1
          
          echo "$($cudaVersion.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "CUDA_PATH=$($cudaVersion.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          echo "Installed CUDA: $($cudaVersion.Name)"
      
      - name: Install Vulkan SDK
        shell: powershell
        run: |
          # 使用 winget 安装 Vulkan SDK
          winget install -e --id LunarG.VulkanSDK --accept-package-agreements --accept-source-agreements
          
          $vulkanSdkPath = Get-ChildItem "C:\VulkanSDK" | Sort-Object -Descending | Select-Object -First 1
          echo "$($vulkanSdkPath.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "VULKAN_SDK=$($vulkanSdkPath.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          echo "Installed Vulkan SDK: $($vulkanSdkPath.Name)"
      
      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --recursive https://github.com/ggml-org/llama.cpp.git build/llama.cpp
      
      - name: Build CUDA
        run: |
          cd build/llama.cpp
          mkdir build-cuda
          cd build-cuda
          cmake .. `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_CUDA=ON `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_BUILD_COMMON=ON `
            -G "Visual Studio 17 2022" `
            -A x64
          cmake --build . --config Release --parallel
      
      - name: Build Vulkan
        run: |
          cd build/llama.cpp
          mkdir build-vulkan
          cd build-vulkan
          cmake .. `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_BUILD_COMMON=ON `
            -G "Visual Studio 17 2022" `
            -A x64
          cmake --build . --config Release --parallel
      
      - name: Build CPU
        run: |
          cd build/llama.cpp
          mkdir build-cpu
          cd build-cpu
          cmake .. `
            -DCMAKE_BUILD_TYPE=Release `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_BUILD_COMMON=ON `
            -G "Visual Studio 17 2022" `
            -A x64
          cmake --build . --config Release --parallel
      
      - name: Copy binaries
        run: |
          mkdir -p moxing/bin/windows-x64-cuda
          mkdir -p moxing/bin/windows-x64-vulkan
          mkdir -p moxing/bin/windows-x64-cpu
          
          cd build/llama.cpp
          
          cp build-cuda/bin/Release/llama-server.exe ../moxing/bin/windows-x64-cuda/ 2>/dev/null || true
          cp build-cuda/bin/Release/llama-cli.exe ../moxing/bin/windows-x64-cuda/ 2>/dev/null || true
          cp build-cuda/bin/Release/llama-bench.exe ../moxing/bin/windows-x64-cuda/ 2>/dev/null || true
          cp build-cuda/bin/Release/*.dll ../moxing/bin/windows-x64-cuda/ 2>/dev/null || true
          
          cp build-vulkan/bin/Release/llama-server.exe ../moxing/bin/windows-x64-vulkan/ 2>/dev/null || true
          cp build-vulkan/bin/Release/llama-cli.exe ../moxing/bin/windows-x64-vulkan/ 2>/dev/null || true
          cp build-vulkan/bin/Release/llama-bench.exe ../moxing/bin/windows-x64-vulkan/ 2>/dev/null || true
          cp build-vulkan/bin/Release/*.dll ../moxing/bin/windows-x64-vulkan/ 2>/dev/null || true
          
          cp build-cpu/bin/Release/llama-server.exe ../moxing/bin/windows-x64-cpu/ 2>/dev/null || true
          cp build-cpu/bin/Release/llama-cli.exe ../moxing/bin/windows-x64-cpu/ 2>/dev/null || true
          cp build-cpu/bin/Release/llama-bench.exe ../moxing/bin/windows-x64-cpu/ 2>/dev/null || true
          cp build-cpu/bin/Release/*.dll ../moxing/bin/windows-x64-cpu/ 2>/dev/null || true
      
      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: moxing/bin/windows-x64-*

  build-macos:
    runs-on: macos-latest
    name: Build macOS (Metal + CPU)
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --recursive https://github.com/ggml-org/llama.cpp.git build/llama.cpp
      
      - name: Build Metal
        run: |
          cd build/llama.cpp
          mkdir build-metal
          cd build-metal
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_METAL=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
      
      - name: Build CPU
        run: |
          cd build/llama.cpp
          mkdir build-cpu
          cd build-cpu
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_METAL=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
      
      - name: Copy binaries
        run: |
          mkdir -p moxing/bin/darwin-arm64-metal
          mkdir -p moxing/bin/darwin-arm64-cpu
          
          cd build/llama.cpp
          
          find build-metal -name "llama-server" -exec cp {} ../moxing/bin/darwin-arm64-metal/ \; 2>/dev/null || true
          find build-metal -name "llama-cli" -exec cp {} ../moxing/bin/darwin-arm64-metal/ \; 2>/dev/null || true
          find build-metal -name "llama-bench" -exec cp {} ../moxing/bin/darwin-arm64-metal/ \; 2>/dev/null || true
          find build-metal -name "*.dylib" -exec cp {} ../moxing/bin/darwin-arm64-metal/ \; 2>/dev/null || true
          
          find build-cpu -name "llama-server" -exec cp {} ../moxing/bin/darwin-arm64-cpu/ \; 2>/dev/null || true
          find build-cpu -name "llama-cli" -exec cp {} ../moxing/bin/darwin-arm64-cpu/ \; 2>/dev/null || true
          find build-cpu -name "llama-bench" -exec cp {} ../moxing/bin/darwin-arm64-cpu/ \; 2>/dev/null || true
          find build-cpu -name "*.dylib" -exec cp {} ../moxing/bin/darwin-arm64-cpu/ \; 2>/dev/null || true
      
      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: moxing/bin/darwin-*

  build-wheel:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    name: Build wheel with all binaries
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Organize binaries
        run: |
          mkdir -p moxing/bin
          
          cp -r artifacts/linux-binaries/* moxing/bin/ 2>/dev/null || true
          cp -r artifacts/windows-binaries/* moxing/bin/ 2>/dev/null || true
          cp -r artifacts/macos-binaries/* moxing/bin/ 2>/dev/null || true
          
          echo "Binary structure:"
          find moxing/bin -type d | sort
          
          echo ""
          echo "Total files:"
          find moxing/bin -type f | wc -l
          
          echo ""
          echo "Total size:"
          du -sh moxing/bin
      
      - name: Install build tools
        run: |
          pip install --upgrade pip build twine
      
      - name: Build wheel with binaries
        run: |
          cat > MANIFEST.in << 'EOF'
          include README.md
          include pyproject.toml
          include LICENSE
          recursive-include moxing *.py
          recursive-include moxing/bin *
          EOF
          
          python -m build --wheel
      
      - name: Check wheel
        run: |
          echo "Built wheel:"
          ls -lh dist/
          
          WHEEL=$(ls dist/*.whl | head -1)
          SIZE=$(stat -c%s "$WHEEL")
          SIZE_MB=$((SIZE / 1024 / 1024))
          
          echo ""
          echo "Wheel: $(basename $WHEEL)"
          echo "Size: $SIZE_MB MB"
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  test-wheel:
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install wheel
        run: pip install dist/*.whl
      
      - name: Test import
        run: |
          python -c "import moxing; print(f'MoXing version: {moxing.__version__}')"
          moxing --version

  release:
    needs: [build-wheel, test-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/wheel/*.whl release/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          name: MoXing ${{ github.ref_name }}
          body: |
            ## MoXing ${{ github.ref_name }}
            
            ### GPU Backends (完整构建)
            - **CUDA** (最新版 via winget)
            - **ROCm 7.1** - AMD RX 7900 XTX (gfx1100)
            - **Vulkan** - 跨平台 GPU
            - **Metal** - Apple Silicon
            - **CPU** - 纯 CPU
            
            ### 安装
            ```bash
            pip install moxing
            ```
            
            ### LAN 访问
            ```bash
            moxing serve model.gguf --host 0.0.0.0
            moxing ollama serve model --host 0.0.0.0
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
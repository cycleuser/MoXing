name: Build MoXing Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    name: Build Linux (CUDA 13.2 + ROCm 7.1.1 + Vulkan + CPU)
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install CUDA 13.2
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/wsl-ubuntu/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt update
          sudo apt install -y cuda-toolkit-13-2
      
      - name: Install ROCm 7.1.1
        run: |
          curl -fsSL https://repo.radeon.com/rocm/rocm.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/rocm-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/rocm-archive-keyring.gpg] https://repo.radeon.com/rocm/apt/7.1.1 jammy main" | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt update
          sudo apt install -y rocm-dev hip-dev rocm-libs
      
      - name: Install Vulkan SDK
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install -y vulkan-sdk
      
      - name: Install build dependencies
        run: sudo apt install -y build-essential cmake git libcurl4-openssl-dev
      
      - name: Clone llama.cpp
        run: git clone --depth 1 --recursive https://github.com/ggml-org/llama.cpp.git build/llama.cpp
      
      - name: Build CUDA 13.2
        run: |
          export PATH=/usr/local/cuda-13.2/bin:$PATH
          export LD_LIBRARY_PATH=/usr/local/cuda-13.2/lib64:$LD_LIBRARY_PATH
          cd build/llama.cpp && mkdir build-cuda && cd build-cuda
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=ON -DLLAMA_BUILD_SERVER=ON -DLLAMA_BUILD_COMMON=ON -DCMAKE_CUDA_ARCHITECTURES="89;90"
          cmake --build . --config Release -j$(nproc)
      
      - name: Build ROCm 7.1.1 (gfx1100 for RX 7900 XTX)
        run: |
          export HIPCXX=/opt/rocm-7.1.1/llvm/bin/clang
          export HIP_PATH=/opt/rocm-7.1.1
          export PATH=/opt/rocm-7.1.1/bin:$PATH
          export LD_LIBRARY_PATH=/opt/rocm-7.1.1/lib:$LD_LIBRARY_PATH
          cd build/llama.cpp && mkdir build-rocm && cd build-rocm
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGGML_HIP=ON -DGPU_TARGETS=gfx1100 -DLLAMA_BUILD_SERVER=ON -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(nproc)
      
      - name: Build Vulkan
        run: |
          cd build/llama.cpp && mkdir build-vulkan && cd build-vulkan
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON -DLLAMA_BUILD_SERVER=ON -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(nproc)
      
      - name: Build CPU
        run: |
          cd build/llama.cpp && mkdir build-cpu && cd build-cpu
          cmake .. -DCMAKE_BUILD_TYPE=Release -DLLAMA_BUILD_SERVER=ON -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(nproc)
      
      - name: Copy binaries
        run: |
          mkdir -p moxing/bin/linux-x64-{cuda,rocm,vulkan,cpu}
          cd build/llama.cpp
          for b in cuda rocm vulkan cpu; do
            cp build-$b/bin/llama-* ../moxing/bin/linux-x64-$b/ 2>/dev/null || true
            cp build-$b/lib*.so* ../moxing/bin/linux-x64-$b/ 2>/dev/null || true
          done
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: moxing/bin/linux-x64-*

  build-windows:
    runs-on: windows-latest
    name: Build Windows (CUDA + Vulkan + CPU)
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install CUDA
        shell: powershell
        run: |
          choco install cuda -y
          $c = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" | Sort-Object -Descending | Select-Object -First 1
          echo "$($c.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Install Vulkan
        shell: powershell
        run: |
          choco install vulkansdk -y
          $v = Get-ChildItem "C:\VulkanSDK" | Sort-Object -Descending | Select-Object -First 1
          echo "$($v.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Clone llama.cpp
        run: git clone --depth 1 --recursive https://github.com/ggml-org/llama.cpp.git build/llama.cpp
      
      - name: Build
        shell: powershell
        run: |
          cd build/llama.cpp
          @("cuda", "vulkan", "cpu") | ForEach-Object {
            $b = $_
            mkdir build-$b | Out-Null
            cd build-$b
            $args = @("..", "-DCMAKE_BUILD_TYPE=Release", "-DLLAMA_BUILD_SERVER=ON", "-DLLAMA_BUILD_COMMON=ON", "-G", "Visual Studio 17 2022", "-A", "x64")
            if ($b -eq "cuda") { $args += "-DGGML_CUDA=ON" }
            if ($b -eq "vulkan") { $args += "-DGGML_VULKAN=ON" }
            cmake $args
            cmake --build . --config Release --parallel
            cd ..
          }
      
      - name: Copy binaries
        run: |
          mkdir -p moxing/bin/windows-x64-{cuda,vulkan,cpu}
          cd build/llama.cpp
          for b in cuda vulkan cpu; do
            cp build-$b/bin/Release/*.exe ../moxing/bin/windows-x64-$b/ 2>/dev/null || true
            cp build-$b/bin/Release/*.dll ../moxing/bin/windows-x64-$b/ 2>/dev/null || true
          done
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: moxing/bin/windows-x64-*

  build-macos:
    runs-on: macos-latest
    name: Build macOS (Metal + CPU)
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Clone llama.cpp
        run: git clone --depth 1 --recursive https://github.com/ggml-org/llama.cpp.git build/llama.cpp
      
      - name: Build Metal
        run: |
          cd build/llama.cpp && mkdir build-metal && cd build-metal
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON -DLLAMA_BUILD_SERVER=ON -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
      
      - name: Build CPU
        run: |
          cd build/llama.cpp && mkdir build-cpu && cd build-cpu
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGGML_METAL=OFF -DLLAMA_BUILD_SERVER=ON -DLLAMA_BUILD_COMMON=ON
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
      
      - name: Copy binaries
        run: |
          mkdir -p moxing/bin/darwin-arm64-{metal,cpu}
          cd build/llama.cpp
          find build-metal -name "llama-*" -type f -executable -exec cp {} ../moxing/bin/darwin-arm64-metal/ \; 2>/dev/null || true
          find build-metal -name "*.dylib" -exec cp {} ../moxing/bin/darwin-arm64-metal/ \; 2>/dev/null || true
          find build-cpu -name "llama-*" -type f -executable -exec cp {} ../moxing/bin/darwin-arm64-cpu/ \; 2>/dev/null || true
          find build-cpu -name "*.dylib" -exec cp {} ../moxing/bin/darwin-arm64-cpu/ \; 2>/dev/null || true
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: moxing/bin/darwin-*

  build-wheel:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Organize binaries
        run: |
          mkdir -p moxing/bin
          cp -r artifacts/*-binaries/* moxing/bin/ 2>/dev/null || true
          echo "Binary size:" && du -sh moxing/bin
      
      - name: Build wheel
        run: |
          pip install --upgrade pip build
          cat > MANIFEST.in << 'EOF'
          include README.md pyproject.toml LICENSE
          recursive-include moxing *.py
          recursive-include moxing/bin *
          EOF
          python -m build --wheel
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  test:
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install dist/*.whl
      - run: python -c "import moxing; print(f'MoXing {moxing.__version__}')"
      - run: moxing --version

  release:
    needs: [build-wheel, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          body: |
            ## GPU Backends
            - CUDA 13.2 (SM 89/90)
            - ROCm 7.1.1 (gfx1100 for RX 7900 XTX)
            - Vulkan
            - Metal (macOS)
            - CPU
            
            ## LAN Access
            ```bash
            moxing serve model.gguf --host 0.0.0.0
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}